name: EAS Android preview build

on:
  # Manual trigger from the Actions tab
  workflow_dispatch:
  # Automatically build and attach APK when a release is published
  release:
    types: [published]

jobs:
  build-android-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to create releases and upload assets

    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install dependencies
        working-directory: festo-mobile
        run: yarn install --frozen-lockfile

      # - name: Run EAS Android preview build
      #   working-directory: festo-mobile
      #   run: |
      #     eas build --profile preview --platform android --non-interactive

      - name: Prepare artifacts directory
        run: mkdir -p artifacts

      - name: Download latest Android preview build artifact
        working-directory: festo-mobile
        run: |
          BUILD_JSON=$(eas build:list --platform android --build-profile preview --status finished --limit 1 --json --non-interactive)
          BUILD_ID=$(echo "$BUILD_JSON" | jq -r 'if type == "array" then .[0].id else .builds[0].id end')
          if [ -z "$BUILD_ID" ] || [ "$BUILD_ID" = "null" ]; then
            echo "Could not get latest build ID"
            exit 1
          fi
          VIEW_JSON=$(eas build:view "$BUILD_ID" --json)
          ARTIFACT_URL=$(echo "$VIEW_JSON" | jq -r '.artifacts.applicationArchiveUrl')
          if [ -z "$ARTIFACT_URL" ] || [ "$ARTIFACT_URL" = "null" ]; then
            echo "Could not get artifact URL for build $BUILD_ID"
            exit 1
          fi
          curl -L -o ../artifacts/festo-android-preview.apk "$ARTIFACT_URL"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: festo-android-preview-apk
          path: artifacts/festo-android-preview.apk

      - name: Set release tag and name
        id: release
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag_name=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
            echo "name=${{ github.event.release.name }}" >> $GITHUB_OUTPUT
            echo "draft=false" >> $GITHUB_OUTPUT
          else
            echo "tag_name=android-preview-${{ github.run_id }}" >> $GITHUB_OUTPUT
            echo "name=Android Preview #${{ github.run_id }}" >> $GITHUB_OUTPUT
            echo "draft=true" >> $GITHUB_OUTPUT
          fi

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/festo-android-preview.apk
          tag_name: ${{ steps.release.outputs.tag_name }}
          name: ${{ steps.release.outputs.name }}
          draft: ${{ steps.release.outputs.draft }}
          generate_release_notes: true
          make_latest: ${{ github.event_name == 'release' }}

